# Rime default settings
# encoding: utf-8

config_version: '0.50'

schema_list:
  # rime-ice 方案
  - schema: rime_ice               # 雾凇拼音（全拼，大词库）
  - schema: t9                     # 中文九键（九宫格）
  - schema: double_pinyin          # 自然码双拼
  - schema: double_pinyin_abc      # 智能 ABC 双拼
  - schema: double_pinyin_mspy     # 微软双拼
  - schema: double_pinyin_sogou    # 搜狗双拼
  - schema: double_pinyin_flypy    # 小鹤双拼
  - schema: double_pinyin_ziguang  # 紫光双拼
  - schema: double_pinyin_jiajia   # 拼音加加双拼
  # 原有方案
  - schema: luna_pinyin
  - schema: terra_pinyin
  - schema: stroke

switcher:
  caption: 〔方案選單〕
  hotkeys:
    - Control+grave
    - Control+Shift+grave
    - F4
  save_options:
    - full_shape
    - ascii_punct
    - simplification
    - extended_charset
    - zh_hant
    - zh_hans
    - zh_hant_tw
  fold_options: true
  abbreviate_options: true
  option_list_separator: '／'

menu:
  page_size: 5

punctuator:
  full_shape:
    __include: punctuation:/full_shape
  half_shape:
    __include: punctuation:/half_shape

key_binder:
  bindings:
    __patch:
      - key_bindings:/emacs_editing
      - key_bindings:/paging_with_minus_equal
      - key_bindings:/paging_with_comma_period
      - key_bindings:/numbered_mode_switch

selector:
  __patch:
    bindings:
      __include: key_bindings:/rotate_candidate_with_tab
    linear/bindings:
      __include: key_bindings:/rotate_candidate_with_tab
    vertical/bindings:
      __include: key_bindings:/rotate_candidate_with_tab
    vertical/linear/bindings:
      __include: key_bindings:/rotate_candidate_with_tab

recognizer:
  patterns:
    email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"
    uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp[.:]|mailto:|file:).*$|^[a-z]+[.].+$"

ascii_composer:
  good_old_caps_lock: true
  switch_key:
    Shift_L: inline_ascii
    Shift_R: commit_text
    Control_L: noop
    Control_R: noop
    Caps_Lock: clear
    Eisu_toggle: clear
