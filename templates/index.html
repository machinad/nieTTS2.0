<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <!-- VAD 依赖库 -->
    <script src="/templates/ort.min.js"></script>
    <script src="/templates/vad.bundle.min.js"></script>
    <title>nieTTS - 文字转语音</title>
    <style>
        :root {
            --primary-color: #ffb6c1;
            --secondary-color: #fff5f7;
            --text-color: #5a5c69;
            --border-radius: 1rem;
            --box-shadow: 0 0.25rem 1.5rem rgba(255, 182, 193, 0.2);
            --transition: all 0.3s ease;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            padding: 1rem;
            background-color: #f8f9fc;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        h1 {
            color: var(--primary-color);
            font-weight: 700;
            margin: 1.5rem 0;
            text-align: center;
        }
        
        .card {
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            border: none;
            background: white;
            margin-bottom: 1.5rem;
            overflow: hidden;
            transition: var(--transition);
        }
        
        .card-header {
            background-color: var(--primary-color);
            color: white;
            font-weight: 600;
            padding: 1rem;
            border-radius: var(--border-radius) var(--border-radius) 0 0;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-control, .form-select {
            width: 100%;/* 宽度设置为100% */
            padding: 0.8rem 1rem;/* 内边距设置为0.8rem 1rem */
            border: 1px solid #d1d3e2;/* 边框设置为1px的实线 */
            border-radius: var(--border-radius);/* 圆角设置为var(--border-radius) */
            font-size: 1rem;/* 字体大小设置为1rem */
            transition: var(--transition);/* 过渡效果设置为var(--transition) */
        }
        .form-rang {
            width: 100%;/* 宽度设置为100% */
            border: 1px solid #d1d3e2;/* 边框设置为1px的实线 */
            border-radius: var(--border-radius);/* 圆角设置为var(--border-radius) */
            font-size: 1rem;/* 字体大小设置为1rem */
            transition: var(--transition);/* 过渡效果设置为var(--transition) */
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.25);
            outline: none;
        }
        
        .btn-primary {
            display: inline-block;/* 内联块元素 */
            width: 100%;/* 宽度设置为100% */
            background-color: var(--primary-color);/* 背景颜色设置为var(--primary-color) */
            color: white;/* 文字颜色设置为white */
            border: none;/* 边框设置为none */
            padding: 1rem;/* 内边距设置为1rem */
            font-size: 1rem;/* 字体大小设置为1rem */
            font-weight: 600;/* 字体加粗 */
            border-radius: var(--border-radius);/* 圆角设置为var(--border-radius) */
            cursor: pointer;/* 鼠标指针设置为pointer */
            transition: var(--transition);/* 过渡效果设置为var(--transition) */
        }
        
        .btn-primary:hover {
            background-color: #fd7194;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 12px rgba(255, 182, 193, 0.3);
        }
        .btn-tts-start  {
            display: inline-block;/* 内联块元素 */
            width: 100%;/* 宽度设置为100% */
            height: 100%;/* 高度设置为100% */;
            background-color: #ff85a4;/* 背景颜色设置为var(--primary-color) */
            color: white;/* 文字颜色设置为white */
            border: none;/* 边框设置为none */
            padding: 1rem;/* 内边距设置为1rem */
            font-size: 1rem;/* 字体大小设置为1rem */
            font-weight: 600;/* 字体加粗 */
            border-radius: var(--border-radius);/* 圆角设置为var(--border-radius) */
            cursor: pointer;/* 鼠标指针设置为pointer */
            transition: var(--transition);/* 过渡效果设置为var(--transition) */
        }
        
        .btn-tts-start:hover {
            background-color: #fd7194;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 12px rgba(255, 182, 193, 0.3);
        }
        .btn-seclectModel    {
            display: inline-block;/* 内联块元素 */
            width: 100%;/* 宽度设置为100% */
            height: 100%;/* 高度设置为100% */;
            background-color: var(--primary-color);/* 背景颜色设置为var(--primary-color) */
            color: white;/* 文字颜色设置为white */
            border: none;/* 边框设置为none */
            padding: 1rem;/* 内边距设置为1rem */
            font-size: 1rem;/* 字体大小设置为1rem */
            font-weight: 600;/* 字体加粗 */
            border-radius: var(--border-radius);/* 圆角设置为var(--border-radius) */
            cursor: pointer;/* 鼠标指针设置为pointer */
            transition: var(--transition);/* 过渡效果设置为var(--transition) */
        }
        
        .btn-seclectModel:hover {
            background-color: #fd7194;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 12px rgba(255, 182, 193, 0.3);
        }
        .mt-3 {
            margin-top: 1rem !important;
        }
        
        .mt-4 {
            margin-top: 1rem !important;
        }

        .card {
            margin-bottom: 1rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        details {
            margin-bottom: 0.75rem;
        }

        .settings-content {
            padding: 0 0.75rem 0.75rem;
        }
        
        footer {
            padding: 0.75rem;
            margin-top: 1.5rem;
        }

        details {
            background: white;
            border-radius: var(--border-radius);
            margin-bottom: 1rem;
            box-shadow: var(--box-shadow);
        }

        summary {
            padding: 1rem;
            cursor: pointer;
            background-color: var(--secondary-color);
            border-radius: var(--border-radius);
            font-weight: 600;
            color: var(--text-color);
        }

        details[open] summary {
            border-bottom: 1px solid #e3e6f0;
            margin-bottom: 1rem;
        }

        .settings-content {
            padding: 0 1rem 1rem;
        }
        
        #logArea {
            height: 200px;
            overflow-y: auto;
            background-color: var(--secondary-color);
            border-radius: 0 0 0.35rem 0.35rem;
            padding: 1rem;
        }
        
        #logArea div {
            padding: 0.5rem;
            border-bottom: 1px solid #e3e6f0;
        }
        
        #logArea div:last-child {
            border-bottom: none;
        }
        
        @media (max-width: 768px) {
            .row {
                flex-direction: column;
            }
            
            .col-md-8, .col-md-4 {
                width: 100%;
                margin-bottom: 1.5rem;
            }
        }
        footer {
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
            color: var(--text-color);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--primary-color);
            text-decoration: none;
            transition: var(--transition);
        }

        footer a:hover {
            color: #fd7194;
            text-decoration: underline;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

/* 隐藏原始复选框 */
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

/* 滑块外观 */
        .toggle-switch-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ffa0c0;
            transition: .4s;
            border-radius: 34px;
        }

/* 滑块圆形按钮 */
        .toggle-switch-slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

/* 选中状态 */
        .toggle-switch input:checked + .toggle-switch-slider {
            background-color: #88ca31;
        }

        .toggle-switch input:checked + .toggle-switch-slider:before {
            transform: translateX(26px);
        }
        input[type=range] {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            margin: 0;
            width: 100%;
            background: transparent;
        }

        /* 移除 Focus 时的边框 */
        input[type=range]:focus {
            outline: none;
        }

        /* 轨道样式 */
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 10px;
            cursor: pointer;
            background: #ffffff;
            border-radius: 2px;
            border: none;
        }

        /* 滑块样式 */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #ffd7e4;
            cursor: pointer;
            margin-top: -5.8px; /* (thumb height - track height) / 2 */
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">nieTTS2.0 <small style="font-size:0.5em; color:#888;">{{ current_version }}</small></h1>
        
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">日志记录喵</div>
                    <div class="card-body" id="logArea"></div>
                </div>
            </div>
            <div class="col-md-12" id="dow_audio">
                <div class="card" style="padding: 10px; align-items: center;">
                    <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
                        <div style="display: flex; align-items: center;">
                            <span style="margin-right: 10px;">是否播放音频</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="isPlayAudio" {% if user_config.isplayaudio %}checked{% endif %}>

                                    <span class="toggle-switch-inner"></span>

                            </label>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <span style="margin-right: 10px;">是否下载</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="isDownload" {% if user_config.isdownload %}checked{% endif %}>
                                <span class="toggle-switch-slider">
                                    <span class="toggle-switch-inner"></span>
                                </span>
                            </label>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <span style="margin-right: 10px;">是否翻译</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="isTranslate" {% if user_config.isTranslate %}checked{% endif %}>
                                <span class="toggle-switch-slider">
                                    <span class="toggle-switch-inner"></span>
                                </span>
                            </label>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <span style="margin-right: 10px;">是否播放译文</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="isPlayTranslation" {% if user_config.isPlayTranslation %}checked{% endif %}>
                                <span class="toggle-switch-slider">
                                    <span class="toggle-switch-inner"></span>
                                </span>
                            </label>
                        </div>
                        <div class="form-group"id="tLanguageSelectGroup" style="display: flex; align-items: center;">
                            <label for="tLanguage" class="form-label" style="display: flex; margin-left: 10px;">目标语言</label>
                            <select class="form-select" id="tLanguage">
                                {% for Language in tlanguages %}
                                <option value="{{ Language }}" {% if Language == user_config.tLanguage %}selected{% endif %}>{{ Language }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div style="display: flex; align-items: center; flex-basis: 100%;">
                            <audio id="audioPlayer" controls style="width: 100%;"></audio>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-12">
                <div class="form-group" id="textInputGroup">
                    <label for="textInput" class="form-label">输入文本</label>
                    <input type="text" class="form-control" id="textInput" placeholder="请输入要转换的文本">
                </div>

                <button class="btn btn-primary mt-3" onclick="convertToSpeech()" id = "updataGroup">
                    <i class="bi bi-soundwave me-2"></i>发送并提交osc
                </button>
                <div class="container">
                    <button class="btn btn-primary mt-3" id="recordButton">点击开始录音</button>
                </div>

                <details class="mt-4">
                    <summary>高级设置</summary>
                    <div class="settings-content">
                        <div class="form-group">
                            <label for="deviceSelect" class="form-label">输出设备</label>
                            <select class="form-select" id="deviceSelect">
                                {% for device in audio_devices %}
                                <option value="{{ device }}" {% if device == user_config.device %}selected{% endif %}>{{ device }}</option>

                        <div class="form-group"id="voiceSelectGroup">

                                {% for voice in edge_tts_voices %}

                                {% endfor %}

                        </div>
                        <div class="form-group"id="aliApiKeyGroup">
                            <label for="aliApiKey" class="form-label">api_key</label>
                            <input type="text" class="form-select" id="aliApiKey" placeholder="请输入api_key" value="{{user_config.ali_api_key}}">
                        </div>
                        <div class="form-group"id="siliconflowApiKeyGroup">
                            <label for="siliconflowApiKeyGroup" class="form-label">硅基流动api_key</label>
                            <input type="text" class="form-select" id="siliconflowApiKey" placeholder="请输入api_key，该key用于语音识别和翻译服务" value="{{user_config.siliconflowApiKey}}">
                        </div>
                        <div class="form-group"id="ali_voiceSelectGroup">
                            <label for="ali_voiceSelect" class="form-label">语音选择</label>
                            <select class="form-select" id="ali_voiceSelect">
                                {% for voice in ali_tts_voices %}
                                <option value="{{ voice }}" {% if voice == user_config.ali_tts_voice %}selected{% endif %}>{{ voice }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group"id="sambert_voiceSelectGroup">
                            <label for="sambert_voiceSelect" class="form-label">语音选择</label>
                            <select class="form-select" id="sambert_voiceSelect">
                                {% for voice in sambert_tts_voices %}
                                <option value="{{ voice }}" {% if voice == user_config.sambert_tts_voice %}selected{% endif %}>{{ voice }}</option>

    <footer>
        <p><a href="https://github.com/machinad/nieTTS2.0" target="_blank">nieTTS2.0</a>由<a href="https://github.com/machinad" target="_blank">machinad</a>构建 | <a href="https://github.com/machinad/nieTTS2.0" target="_blank">GitHub</a>源代码遵循 <a href="https://www.apache.org/licenses/LICENSE-2.0" target="_blank">Apache-2.0 license协议</a></p>
    </footer>

    <script>
        // 配置 ONNX Runtime WASM 路径
        ort.env.wasm.wasmPaths = '/templates/';

        //--------VAD + STT 代码块--------
        // --- 1. 获取 DOM 元素 ---
        const recordButton = document.getElementById('recordButton');

        // --- 2. 定义状态变量 ---
        let myvad = null;           // VAD 实例
        let isRecording = false;    // 是否正在录音
        let isProcessing = false;   // 是否正在处理音频（发送到API）
        let isInitialized = false;  // VAD 是否已初始化
        let speechCount = 0;        // 语音段计数

        // --- 3. API 相关配置 ---
        const STT_API_URL = 'https://api.siliconflow.cn/v1/audio/transcriptions';
        const STT_MODEL = 'TeleAI/TeleSpeechASR';

        // --- 4. 工具函数：Float32Array 转 WAV ---
        function float32ToWav(float32Array, sampleRate = 16000) {
            const buffer = new ArrayBuffer(44 + float32Array.length * 2);
            const view = new DataView(buffer);
            
            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };
            
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + float32Array.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, float32Array.length * 2, true);
            
            for (let i = 0; i < float32Array.length; i++) {
                const s = Math.max(-1, Math.min(1, float32Array[i]));
                view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            
            return new Blob([buffer], { type: 'audio/wav' });
        }

        // --- 5. 初始化 VAD ---
        async function initVAD() {
            if (isInitialized) return true;
            
            try {
                addLog('正在加载 VAD 模型...');
                
                myvad = await vad.MicVAD.new({
                    workletURL: '/templates/vad.worklet.bundle.min.js',
                    modelURL: '/templates/silero_vad.onnx',
                    positiveSpeechThreshold: 0.5,
                    negativeSpeechThreshold: 0.35,
                    minSpeechFrames: 3,
                    redemptionFrames: 8,
                    onSpeechStart: () => {
                        speechCount++;
                        addLog(`检测到语音开始 (#${speechCount})`);
                    },
                    onSpeechEnd: async (audio) => {
                        const duration = (audio.length / 16000).toFixed(2);
                        addLog(`语音结束，时长: ${duration}秒`);
                        
                        // 异步处理，不阻塞 VAD
                        processAudio(audio).catch(err => {
                            addLog(`音频处理错误: ${err.message}`);
                        });
                    },
                    onVADMisfire: () => {
                        addLog('VAD 误触发，已忽略');
                    }
                });
                
                isInitialized = true;
                addLog('VAD 模型加载完成');
                return true;
            } catch (error) {
                addLog(`VAD 初始化失败: ${error.message}`);
                return false;
            }
        }

        // --- 6. 处理音频（发送到 STT API）---
        async function processAudio(float32Audio) {
            const apiToken = document.getElementById('siliconflowApiKey').value;
            
            if (!apiToken || apiToken.length < 10) {
                addLog('错误: 请先配置有效的硅基流动 API Key');
                return;
            }
            
            isProcessing = true;
            
            try {
                // 转换为 WAV
                const wavBlob = float32ToWav(float32Audio, 16000);
                addLog('正在发送语音到识别服务...');
                
                // 构建 FormData
                const formData = new FormData();
                formData.append('file', wavBlob, 'recording.wav');
                formData.append('model', STT_MODEL);
                
                // 发送到硅基流动 API
                const response = await fetch(STT_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiToken}`
                    },
                    body: formData
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    const errorMsg = errorData.error?.message || `HTTP ${response.status}`;
                    throw new Error(errorMsg);
                }
                
                const data = await response.json();
                
                if (data.text && data.text.trim()) {
                    addLog(`识别结果: ${data.text}`);
                    // 设置文本并推送到后端
                    document.getElementById('textInput').value = data.text;
                    convertToSpeech();
                } else {
                    addLog('识别结果为空，请重试');
                }
            } catch (error) {
                addLog(`语音识别失败: ${error.message}`);
            } finally {
                isProcessing = false;
            }
        }

        // --- 7. 按钮点击事件 ---
        recordButton.addEventListener('click', async () => {
            if (isRecording) {
                stopVAD();
            } else {
                await startVAD();
            }
        });

        // --- 8. 开始 VAD 监听 ---
        async function startVAD() {
            // 先初始化 VAD（如果还没初始化）
            if (!isInitialized) {
                recordButton.textContent = '加载中...';
                recordButton.disabled = true;
                const success = await initVAD();
                recordButton.disabled = false;
                if (!success) {
                    recordButton.textContent = '点击开始录音';
                    return;
                }
            }
            
            try {
                await myvad.start();
                isRecording = true;
                speechCount = 0;
                recordButton.textContent = '监听中...（点击停止）';
                recordButton.style.backgroundColor = '#88ca31';
                addLog('开始监听麦克风...');
            } catch (error) {
                addLog(`启动监听失败: ${error.message}`);
                recordButton.textContent = '点击开始录音';
            }
        }

        // --- 9. 停止 VAD 监听 ---
        function stopVAD() {
            if (myvad) {
                myvad.pause();
            }
            isRecording = false;
            recordButton.textContent = '点击开始录音';
            recordButton.style.backgroundColor = '';
            addLog('停止监听');
        }

        //--------VAD + STT 代码块结束--------
        let currentAudioUrl = null;
        function addLog(text){
            const logArea = document.getElementById("logArea")
            logArea.innerHTML+=`<div>${text}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
        }
        function convertToSpeech() {
            const text = document.getElementById('textInput').value.trim();
            if (currentAudioUrl) {
                URL.revokeObjectURL(currentAudioUrl);
                currentAudioUrl = null;
            }
            if (!text) {
                addLog('请输入文本后再提交');
                return;
            }

            const data = {
                text: text,
                device: document.getElementById('deviceSelect').value,
                provider: document.getElementById('providerSelect').value,
                edge_tts_voice: document.getElementById('voiceSelect').value,
                tLanguage: document.getElementById('tLanguage').value,
                ali_api_key: document.getElementById('aliApiKey').value,
                ali_tts_voice: document.getElementById('ali_voiceSelect').value,
                sambert_tts_voice: document.getElementById('sambert_voiceSelect').value,
                siliconflowApiKey: document.getElementById('siliconflowApiKey').value,
                isdownload:document.getElementById('isDownload').checked,
                isplayaudio:document.getElementById('isPlayAudio').checked,
                isTranslate:document.getElementById('isTranslate').checked,
                isPlayTranslation:document.getElementById('isPlayTranslation').checked
            };

            // 添加到日志
            addLog(text);

            // 清空输入框
            document.getElementById('textInput').value = '';

            // 发送到服务器
            fetch('/tts', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                // 检查响应状态
                if (!response.ok) {
                    // 尝试解析错误信息
                    return response.text().then(text => {
                        let errorMsg = `HTTP错误 ${response.status}`;
                        try {
                            const errorJson = JSON.parse(text);
                            if (errorJson.error) {
                                errorMsg = errorJson.error;
                            }
                        } catch (e) {
                            // 如果不是JSON，使用原始文本
                            if (text) errorMsg = text;
                        }
                        throw new Error(errorMsg);
                    });
                }

                // 根据是否下载返回不同类型的数据
                if (data.isdownload) {
                    return response.blob();
                } else {
                    return response.json();
                }
            })
            .then(result => {
                if (data.isdownload) {
                    const currentAudioUrl = URL.createObjectURL(result);
                    const audioElement = document.querySelector('#audioPlayer');
                    audioElement.src = currentAudioUrl;
                    // audioElement.play();
                    addLog('音频下载成功，已加载到播放器');
                } else {
                    console.log('音频生成成功', result);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                addLog(`错误: ${error.message}`);
            });
        }

        // 支持按回车键提交
        document.getElementById('textInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                convertToSpeech();
            }
        });
        document.addEventListener('DOMContentLoaded',function() {
                const providerSelect = document.getElementById('providerSelect');
                const voiceSelectGroup = document.getElementById('voiceSelectGroup');
                const aliApiKeyGroup = document.getElementById('aliApiKeyGroup');
                const siliconflowApiKeyGroup = document.getElementById('siliconflowApiKeyGroup');
                const ali_voiceSelectGroup = document.getElementById('ali_voiceSelectGroup');
                const sambert_voiceSelectGroup = document.getElementById('sambert_voiceSelectGroup');
                const downAuidioGroup = document.getElementById("dow_audio")
                const textInputGroup = document.getElementById("textInputGroup")
                const updataGroup = document.getElementById("updataGroup")
                const deviceSelect = document.getElementById('deviceSelect');
                function toggleProviderSettings(){
                    voiceSelectGroup.style.display = "none";
                    aliApiKeyGroup.style.display = "none";
                    siliconflowApiKeyGroup.style.display = "none";
                    ali_voiceSelectGroup.style.display = "none";
                    sambert_voiceSelectGroup.style.display = "none";
                    downAuidioGroup.style.display = "none";
                    textInputGroup.style.display = "none";
                    updataGroup.style.display = "none";
                    deviceSelect.style.display = "none";
                    if(providerSelect.value ==='Edge TTS'){
                        siliconflowApiKeyGroup.style.display = "block";
                        voiceSelectGroup.style.display = "block";
                        downAuidioGroup.style.display = "block";
                        textInputGroup.style.display = "block";
                        updataGroup.style.display = "block";
                        deviceSelect.style.display = "block";
                    }
                    else if(providerSelect.value ==='阿里百炼cosyvice'){
                        aliApiKeyGroup.style.display = "block";
                        siliconflowApiKeyGroup.style.display = "block";
                        ali_voiceSelectGroup.style.display = "block";
                        downAuidioGroup.style.display = "block";
                        textInputGroup.style.display = "block";
                        updataGroup.style.display = "block";
                        deviceSelect.style.display = "block";
                    }
                    else if(providerSelect.value ==='阿里百炼sambert'){
                        aliApiKeyGroup.style.display = "block";
                        siliconflowApiKeyGroup.style.display = "block";
                        sambert_voiceSelectGroup.style.display = "block";
                        downAuidioGroup.style.display = "block";
                        textInputGroup.style.display = "block";
                        updataGroup.style.display = "block";
                        deviceSelect.style.display = "block";
                    }
                }
                toggleProviderSettings();
                providerSelect.addEventListener('change',toggleProviderSettings);
                
                // 版本检测
                checkForUpdate();
        }
        );
        
        //--------版本检测代码块--------
        const CURRENT_VERSION = "{{ current_version }}";  // 后端注入的当前版本号
        const GITHUB_REPO = "machinad/nieTTS2.0";  // GitHub 仓库
        
        // 比较版本号，返回是否有更新
        function compareVersions(latest, current) {
            try {
                // 移除 'v' 前缀
                const latestNum = latest.replace(/^v/, '').split('.').map(Number);
                const currentNum = current.replace(/^v/, '').split('.').map(Number);
                
                for (let i = 0; i < Math.max(latestNum.length, currentNum.length); i++) {
                    const l = latestNum[i] || 0;
                    const c = currentNum[i] || 0;
                    if (l > c) return true;
                    if (l < c) return false;
                }
                return false;
            } catch (e) {
                return false;
            }
        }
        
        // 检查更新
        async function checkForUpdate() {
            const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/releases/latest`;
            
            try {
                const response = await fetch(apiUrl, {
                    headers: {
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!response.ok) {
                    addLog(`版本检查失败: HTTP ${response.status}`);
                    return;
                }
                
                const data = await response.json();
                const latestVersion = data.tag_name || '';
                const releaseUrl = data.html_url || `https://github.com/${GITHUB_REPO}/releases`;
                
                if (compareVersions(latestVersion, CURRENT_VERSION)) {
                    addLog(`发现新版本 ${latestVersion}！当前版本 ${CURRENT_VERSION}`);
                    addLog(`<a href="${releaseUrl}" target="_blank" style="color: var(--primary-color);">点击前往 GitHub 下载新版本</a>`);
                } else {
                    addLog(`当前已是最新版本 ${CURRENT_VERSION}`);
                }
            } catch (error) {
                addLog(`版本检查失败: ${error.message}`);
            }
        }
        //--------版本检测代码块结束--------
    </script>
